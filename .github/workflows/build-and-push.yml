name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      autumn_repo:
        description: "Autumn repository in owner/name format (e.g. useautumn/autumn)"
        required: false
        default: "useautumn/autumn"
      autumn_version:
        description: "Autumn version — git tag (e.g. v1.2.3) or branch (e.g. main)"
        required: false
        default: "main"
      image_tag:
        description: "Docker tag to publish (use slug-safe value, e.g. main or test-cors)"
        required: false
        default: "main"
      server_autumn_repo:
        description: "Optional override repo for backend image only"
        required: false
        default: ""
      server_autumn_version:
        description: "Optional override branch/tag for backend image only"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/ramadanomar/autumn
  DASHBOARD_IMAGE: ghcr.io/ramadanomar/autumn-dashboard
  CHECKOUT_IMAGE: ghcr.io/ramadanomar/autumn-checkout

jobs:
  # --------------------------------------------------------------------------
  # Backend image — used by server, workers, and cron (CMD override per service)
  # --------------------------------------------------------------------------
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          build-args: |
            AUTUMN_REPO=${{ inputs.server_autumn_repo || inputs.autumn_repo || 'useautumn/autumn' }}
            AUTUMN_VERSION=${{ inputs.server_autumn_version || inputs.autumn_version || 'main' }}
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ inputs.image_tag || 'main' }}
          cache-from: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache,mode=max

  # --------------------------------------------------------------------------
  # Dashboard frontend — Vite SPA with runtime env var injection
  # --------------------------------------------------------------------------
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          build-args: |
            AUTUMN_REPO=${{ inputs.autumn_repo || 'useautumn/autumn' }}
            AUTUMN_VERSION=${{ inputs.autumn_version || 'main' }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ inputs.image_tag || 'main' }}
          cache-from: type=registry,ref=${{ env.DASHBOARD_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DASHBOARD_IMAGE }}:buildcache,mode=max

  # --------------------------------------------------------------------------
  # Checkout frontend — customer-facing checkout pages
  # --------------------------------------------------------------------------
  build-checkout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.checkout
          push: true
          platforms: linux/amd64
          build-args: |
            AUTUMN_REPO=${{ inputs.autumn_repo || 'useautumn/autumn' }}
            AUTUMN_VERSION=${{ inputs.autumn_version || 'main' }}
          tags: |
            ${{ env.CHECKOUT_IMAGE }}:latest
            ${{ env.CHECKOUT_IMAGE }}:${{ inputs.image_tag || 'main' }}
          cache-from: type=registry,ref=${{ env.CHECKOUT_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.CHECKOUT_IMAGE }}:buildcache,mode=max
